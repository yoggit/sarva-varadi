# Sarva-Varadi Configuration File
# Place this file in your project root or src/test/resources/
# Command-line properties (-D) take precedence over these settings

# Screenshot capture mode
# Options:
#   - always: Capture at test end for all tests (pass/fail/skip) + errors
#   - on-failure: Only capture on test failure/broken + errors
#   - never: Disable screenshot capture
# Default: on-failure
sarva.screenshot=on-failure

# Sensitive data masking (passwords, tokens, API keys)
# Options: true, false
# Default: false
sarva.maskSensitiveData=false

# Output directory for test results
# Default: sarva-varadi-results
sarva.outputDir=sarva-varadi-results

# Screenshot directory
# Default: sarva-varadi-results/screenshots
sarva.screenshotDir=sarva-varadi-results/screenshots

# Maximum retry count for flaky test detection
# Default: 2
sarva.maxRetryCount=2
