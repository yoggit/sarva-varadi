# Sarva-Varadi Configuration File for Demo
# This file demonstrates various configuration options

# ===========================================
# Screenshot Configuration
# ===========================================
# Options: always, on-failure, never
# - always: Capture screenshots at test start AND end for all tests (pass/fail/skip)
# - on-failure: Only capture on test failure/broken (default)
# - never: Disable screenshot capture
sarva.screenshot=always

# ===========================================
# Security Configuration
# ===========================================
# Mask sensitive data (passwords, tokens, API keys) in test logs
# Options: true, false
sarva.maskSensitiveData=true

# ===========================================
# Output Configuration
# ===========================================
# Directory for test results JSON file
sarva.outputDir=sarva-varadi-results

# Directory for screenshot files
sarva.screenshotDir=sarva-varadi-results/screenshots

# ===========================================
# Retry Configuration
# ===========================================
# Maximum number of retry attempts for flaky test detection
# Tests that pass after retries are marked as "flaky"
sarva.maxRetryCount=2

# ===========================================
# Usage Examples
# ===========================================
# 1. Use this file as-is: Just copy to your project root
# 2. Override via command line: mvn test -Dsarva.screenshot=never
# 3. Different environments:
#    - CI/CD: sarva.screenshot=always (for visual debugging)
#    - Local dev: sarva.screenshot=on-failure (save disk space)
#    - Performance tests: sarva.screenshot=never (maximum speed)
