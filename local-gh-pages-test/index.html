<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarva-Varadi Demo Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
            color: #e8eaf0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-top: -1.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00d9ff 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #9ca3af;
            margin-bottom: 3rem;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .demo-grid {
                grid-template-columns: 1fr;
            }
        }

        .demo-card {
            background: #1a1f35;
            border: 1px solid #2d3550;
            border-radius: 12px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .demo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            border-color: #6366f1;
        }

        .demo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .demo-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .demo-desc {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .github-link {
            display: inline-block;
            margin-top: 3rem;
            padding: 1rem 2rem;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .github-link:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.svg" alt="Sarva-Varadi Logo" style="width: 180px; height: 180px; margin-bottom: 0;">
        <h1>Sarva-Varadi</h1>
        <p class="subtitle">Universal Test Reporting Framework - Live Demo Reports</p>

        <div class="demo-grid">
            <a href="playwright/index.html" class="demo-card">
                <div class="demo-icon">🎭</div>
                <div class="demo-title">Playwright</div>
                <div class="demo-desc">JavaScript/TypeScript end-to-end testing with traces and videos</div>
            </a>

            <a href="selenium/index.html" class="demo-card">
                <div class="demo-icon">🔬</div>
                <div class="demo-title">Selenium</div>
                <div class="demo-desc">Java WebDriver testing with screenshots and actions</div>
            </a>

            <a href="rest-assured/index.html" class="demo-card">
                <div class="demo-icon">🌐</div>
                <div class="demo-title">RestAssured</div>
                <div class="demo-desc">Java API testing with request/response capture</div>
            </a>
        </div>

        <a href="https://github.com/yoggit/sarva-varadi" class="github-link" target="_blank">
            ⭐ View on GitHub
        </a>
    </div>
</body>
</html>
