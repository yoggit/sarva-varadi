name: Demo Tests

run-name: Demo Tests - ${{ inputs.test_framework || 'All Frameworks (Auto)' }}

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_framework:
        description: 'Test Framework (leave empty to run all)'
        required: false
        type: choice
        options:
          - ''
          - playwright
          - restassured
          - selenium

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --workspaces --if-present --ignore-scripts

      - name: Clean build artifacts
        run: |
          rm -rf packages/*/dist packages/*/*.tsbuildinfo

      - name: Build core package first
        run: cd packages/core && npm run build

      - name: Build all packages
        run: npm run build

      - name: Install Playwright browsers
        if: ${{ inputs.test_framework == 'playwright' || inputs.test_framework == '' }}
        run: npx playwright install --with-deps
        working-directory: demo-playwright

      - name: Run Playwright tests
        if: ${{ inputs.test_framework == 'playwright' || inputs.test_framework == '' }}
        run: npm test
        working-directory: demo-playwright
        continue-on-error: true

      - name: Generate Selenium report from static data
        if: ${{ inputs.test_framework == 'selenium' || inputs.test_framework == '' }}
        run: |
          # Use static test data for Selenium demo
          node packages/core/dist/cli.js convert \
            --input demo-selenium/testng-source/data.json \
            --output demo-selenium/sarva-report \
            --format testng-selenium \
            --use-current-timestamp
        continue-on-error: true

      - name: Generate RestAssured report from static data
        if: ${{ inputs.test_framework == 'restassured' || inputs.test_framework == '' }}
        run: |
          # Use static test data for RestAssured demo
          node packages/core/dist/cli.js convert \
            --input demo-restassured/testng-source/data.json \
            --output demo-restassured/sarva-report \
            --format testng-listener \
            --use-current-timestamp
        continue-on-error: true

      - name: Fetch and merge existing history from GitHub Pages
        if: always()
        continue-on-error: true
        run: |
          echo "📦 Fetching existing history from GitHub Pages..."

          # Clone gh-pages branch to a temporary directory
          git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }}.git gh-pages-old 2>/dev/null || echo "No gh-pages branch yet"

          if [ -d "gh-pages-old" ]; then
            echo "✅ Found existing gh-pages branch"

            # Merge existing history for each framework
            for framework in playwright:demo-playwright selenium:demo-selenium rest-assured:demo-restassured; do
              IFS=':' read -r gh_name local_name <<< "$framework"

              echo "  📊 Processing $gh_name..."
              echo "    Looking for: gh-pages-old/$gh_name/history"
              echo "    Target: $local_name/sarva-report/history"

              if [ -d "gh-pages-old/$gh_name/history" ]; then
                echo "    ✓ Found old history"
                ls -la "gh-pages-old/$gh_name/history" | head -5

                if [ -d "$local_name/sarva-report/history" ]; then
                  echo "    ✓ Found new history directory"
                  echo "    📋 Before merge:"
                  ls -la "$local_name/sarva-report/history" | wc -l

                  # Copy old history folders that don't exist in new report
                  cp -rn gh-pages-old/$gh_name/history/* $local_name/sarva-report/history/ 2>/dev/null || true

                  echo "    📋 After merge:"
                  ls -la "$local_name/sarva-report/history" | wc -l
                  echo "    ✅ Merged $gh_name history"
                else
                  echo "    ⚠️  New history directory doesn't exist yet"
                fi
              else
                echo "    ⚠️  No old history found for $gh_name"
              fi
            done

            rm -rf gh-pages-old
            echo "✅ History merge complete"
          else
            echo "ℹ️  No existing history to merge (first deployment)"
          fi

      - name: Create deployment structure
        if: always()
        run: |
          mkdir -p gh-pages-deploy
          if [ -d "demo-playwright/sarva-report" ]; then
            cp -r demo-playwright/sarva-report gh-pages-deploy/playwright
          fi
          if [ -d "demo-selenium/sarva-report" ]; then
            cp -r demo-selenium/sarva-report gh-pages-deploy/selenium
          fi
          if [ -d "demo-restassured/sarva-report" ]; then
            cp -r demo-restassured/sarva-report gh-pages-deploy/rest-assured
          fi

      - name: Create landing page
        if: always()
        run: cp local-gh-pages-test/index.html gh-pages-deploy/index.html

      - name: Upload Sarva-Varadi Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarva-varadi-reports
          path: gh-pages-deploy/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          keep_files: true  # Preserve existing history folders
