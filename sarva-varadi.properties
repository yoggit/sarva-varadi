# ══════════════════════════════════════════════════════════════════════
# Sarva-Varadi Configuration
# Copy this file to your project root and uncomment what you need.
# System properties (-D flags) always override file values.
# Docs: https://github.com/yoggit/sarva-varadi
# ══════════════════════════════════════════════════════════════════════


# ── OUTPUT ─────────────────────────────────────────────────────────────
# [RestAssured TestNG, RestAssured JUnit 5, Selenium] Directory where test-results.json is written
#sarva.outputDir=sarva-varadi-results


# ── SENSITIVE DATA MASKING ─────────────────────────────────────────────
# [RestAssured TestNG, RestAssured JUnit 5, Selenium] Mask passwords, tokens, API keys in reports
# When enabled: request bodies, headers, and field values matching
# password/token/secret/apikey/authorization patterns are replaced with ***
#sarva.maskSensitiveData=false

# [Playwright] Configure in playwright.config.ts reporter options:
#   maskSensitiveData: true
# Masks step titles like page.fill('#password', 'secret') → page.fill('#password', '***')


# ── SCREENSHOTS ────────────────────────────────────────────────────────
# [Selenium] When to capture screenshots
#   always     — capture on every test (pass and fail)
#   on-failure — capture only on failed/broken tests (default)
#   never      — disable screenshots entirely
#sarva.screenshot=on-failure

# [Selenium] Directory for screenshot files
#sarva.screenshotDir=sarva-varadi-results/screenshots

# [RestAssured JUnit 5] Screenshots not applicable — API tests have no browser UI.
# HTTP request/response details are captured as test steps automatically.

# [Playwright] Configure in playwright.config.ts:
#   use: { screenshot: 'on' }              → always
#   use: { screenshot: 'only-on-failure' } → on failure only
#   use: { screenshot: 'off' }             → never


# ── VIDEO RECORDING ────────────────────────────────────────────────────
# [Playwright] Configure in playwright.config.ts:
#   use: { video: 'on' }                → always record
#   use: { video: 'retain-on-failure' } → keep only on failure
#   use: { video: 'on-first-retry' }    → record on retries
#   use: { video: 'off' }               → disabled


# ── TRACE RECORDING ────────────────────────────────────────────────────
# [Playwright] Configure in playwright.config.ts:
#   use: { trace: 'on' }                → always record
#   use: { trace: 'retain-on-failure' } → keep only on failure
#   use: { trace: 'on-first-retry' }    → record on retries
#   use: { trace: 'off' }               → disabled


# ── FLAKY TEST DETECTION & RETRY ───────────────────────────────────────
# [RestAssured TestNG, Selenium] Max retry attempts for failed tests.
# Tests that pass after retries are marked as FLAKY in the report.
# Requires @Test(retryAnalyzer = SarvaVaradiRetryAnalyzer.class) on the method.
#sarva.maxRetryCount=2

# [RestAssured JUnit 5] Retries are configured in pom.xml via maven-surefire-plugin —
# NOT via this property file. Add to your surefire config:
#   <rerunFailingTestsCount>1</rerunFailingTestsCount>
# The extension automatically detects retried tests and marks them as FLAKY.

# [Playwright] Configure retries in playwright.config.ts:
#   retries: 2


# ── REPORT: HISTORY & TRENDS ───────────────────────────────────────────
# [All tools] Maximum number of past runs to keep.
# When run N+1 arrives, the oldest run is deleted (one at a time).
#sarva.report.maxRuns=20

# [All tools] Maximum age in days of runs to keep.
# All runs older than this are deleted when the next run triggers cleanup.
# Note: whichever limit (maxRuns or retentionDays) is hit first, wins.
#sarva.report.retentionDays=90

# [All tools] Enable/disable trend analysis across runs
#sarva.report.trends=true

# [All tools] Enable/disable historical run tracking
#sarva.report.history=true


# ── REPORT: DISPLAY ────────────────────────────────────────────────────
# [All tools] Title shown in the HTML report header
#sarva.report.title=My Test Suite

# [All tools] Show full stack traces in the report
#sarva.report.showStackTrace=true

# [All tools] Embed screenshots and videos inline in the report
#sarva.report.embedAttachments=true


# ── NOTIFICATIONS ──────────────────────────────────────────────────────
# [All tools] Send Slack/Teams/Email notifications after each test run.
# Use ${ENV_VAR} syntax for secrets — they are resolved from environment variables at runtime.
# [Playwright] configure notifications in playwright.config.ts reporter options instead.

# Master switch — must be true for any notification to fire
#sarva.notifications.enabled=false

# ── Slack ──────────────────────────────────────────────────────────────
#sarva.notifications.slack.enabled=false
#sarva.notifications.slack.webhookUrl=${SLACK_WEBHOOK_URL}
#sarva.notifications.slack.channel=#test-results
# Comma-separated usernames to @mention when tests fail (without the @):
#sarva.notifications.slack.mentionOnFailure=john.doe,jane.smith

# ── Microsoft Teams ────────────────────────────────────────────────────
#sarva.notifications.teams.enabled=false
#sarva.notifications.teams.webhookUrl=${TEAMS_WEBHOOK_URL}

# ── Email ──────────────────────────────────────────────────────────────
#sarva.notifications.email.enabled=false
#sarva.notifications.email.smtp.host=smtp.gmail.com
#sarva.notifications.email.smtp.port=587
#sarva.notifications.email.smtp.secure=false
#sarva.notifications.email.smtp.user=${EMAIL_USER}
#sarva.notifications.email.smtp.pass=${EMAIL_PASS}
#sarva.notifications.email.from=tests@company.com
# Comma-separated list of recipients:
#sarva.notifications.email.to=qa@company.com,dev@company.com
#sarva.notifications.email.subject=Test Results — ${passRate}% pass rate
